<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lucky Gift</title>

<!-- LOAD CONFETTI -->
<script id="confettiScript"
src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
</script>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

#gift{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:contain;
background:black;
}
</style>
</head>

<body>

<img id="gift">

<audio id="winSound" src="win.mp3" preload="auto"></audio>

<script>

// ===== FILE ẢNH =====
const voucher="voucher.png"
const qua6="qua6.png"

const gifts=[
"qua1.png",
"qua2.png",
"qua3.png",
"qua4.png",
"qua5.png"
]

// ===== CHỜ CONFETTI LOAD XONG =====
document.getElementById("confettiScript").onload=startApp

function startApp(){

// random 1 lần / máy
let result=localStorage.getItem("giftResult")

if(!result){

const r=Math.random()

if(r<0.6){
result=voucher
}
else if(r<0.7){
result=qua6
}
else{
result=gifts[Math.floor(Math.random()*gifts.length)]
}

localStorage.setItem("giftResult",result)
}

showGift(result)
}

// ===== HIỂN THỊ =====
function showGift(src){

const img=document.getElementById("gift")
img.src=src

// nếu trúng voucher
if(src===voucher){

playWinEffect()
}
}

// ===== HIỆU ỨNG TRÚNG =====
function playWinEffect(){

// thử phát nhạc (mobile có thể chặn)
document.getElementById("winSound").play().catch(()=>{})

// rung (Android)
if(navigator.vibrate){
navigator.vibrate([300,100,300,100,600])
}

// CONFETTI NỔ MẠNH (mobile vẫn thấy)
burst()
setTimeout(burst,200)
setTimeout(burst,400)
setTimeout(burst,600)
}

function burst(){
confetti({
particleCount:120,
spread:120,
startVelocity:35,
gravity:0.8,
origin:{y:0.6}
})
}

</script>

</body>
</html>
