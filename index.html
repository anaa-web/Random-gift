X<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Gift</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  #gift {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* ảnh to hết màn hình nhưng không méo */
  }
</style>
</head>

<body>

<img id="gift" src="">

<script>
const voucher = "voucher.png"

const otherGifts = [
  "qua1.png",
  "qua2.png",
  "qua3.png",
  "qua4.png",
  "qua5.png"
]

function showRandomGift() {

  const random = Math.random()

  if (random < 0.8) {
    // 80% voucher
    document.getElementById("gift").src = voucher
  } else {
    // 20% quà thường
    const index = Math.floor(Math.random() * otherGifts.length)
    document.getElementById("gift").src = otherGifts[index]
  }
}

showRandomGift()
</script>

</body>
</html>
